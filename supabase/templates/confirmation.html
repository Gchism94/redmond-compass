<!-- Redmond Compass — passwordless sign-in (first-time / signup). Same 6-digit code
     UX as the magic-link template so a brand-new owner's flow is identical. -->
<h2>Welcome to Redmond Compass</h2>
<p>Enter this code to finish signing in:</p>
<p style="font-size:28px;font-weight:700;letter-spacing:4px;margin:12px 0">{{ .Token }}</p>
<p>It expires in 1 hour. Or just tap:</p>
<p><a href="{{ .ConfirmationURL }}">Confirm and sign in</a></p>
<p style="color:#888;font-size:12px">If you didn't request this, you can ignore this email.</p>
