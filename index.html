<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5"
    />
    <meta name="theme-color" content="#082954" />
    <meta name="description" content="The free community app from redmondcompass.com — local directory, events, and resources for Redmond, Terrebonne, and Crooked River Ranch. No ads, no paid placement." />
    <!-- SPA-shell canonical: every client route consolidates to the app origin's
         landing; prerendered guide pages REPLACE this with their own canonical. -->
    <link rel="canonical" href="https://app.redmondcompass.com/" />
    <!-- OG/Twitter — SELF-HOSTED image (never a third-party CDN), og:url = the app URL -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Redmond Compass" />
    <meta property="og:title" content="Redmond Compass — the app for Redmond, Terrebonne & Crooked River Ranch" />
    <meta property="og:description" content="The free community app: local directory, events, and resources. No ads, no paid placement." />
    <meta property="og:url" content="https://app.redmondcompass.com/" />
    <meta property="og:image" content="https://app.redmondcompass.com/og.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://app.redmondcompass.com/og.jpg" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Compass" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Fonts: Playfair Display (headings/display only) + DM Sans (everything else) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap"
      rel="stylesheet"
    />

    <title>Redmond Compass</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
