<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Redmond Compass">
  <rect width="64" height="64" rx="14" fill="#082954"/>
  <circle cx="32" cy="32" r="20" fill="none" stroke="#FAF8F5" stroke-width="2.5" opacity="0.5"/>
  <!-- compass needle: amber north, cream south -->
  <polygon points="32,14 38,32 32,30 26,32" fill="#C86604"/>
  <polygon points="32,50 26,32 32,34 38,32" fill="#FAF8F5"/>
  <circle cx="32" cy="32" r="3" fill="#2E6049"/>
</svg>
